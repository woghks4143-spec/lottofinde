name: Fetch lottery data (mirror)

# 매주 토요일 자동 실행 + 수동 실행 가능
# 동행복권 본사이트는 WAF로 자동화 차단 → smok95/lotto 미러에서 가져옴.
# smok95이 매주 토 20:43, 20:51, 21:03 KST 업데이트.
# 추첨 직후 빠르게 사용자에게 결과 노출하기 위해 5번 시도.
on:
  schedule:
    # GitHub Actions cron은 고부하 시 수십 분~수 시간 지연될 수 있어, 토요일 밤
    # 촘촘하게 여러 번 시도해 그중 하나라도 일찍 걸리도록 함. (앱은 smok95 직접
    # 폴백도 있어, GitHub이 늦어도 사용자는 즉시 최신 결과를 봄.)
    - cron: '5 12 * * 6'   # 토 21:05 KST
    - cron: '12 12 * * 6'  # 토 21:12 KST
    - cron: '20 12 * * 6'  # 토 21:20 KST
    - cron: '30 12 * * 6'  # 토 21:30 KST
    - cron: '45 12 * * 6'  # 토 21:45 KST
    - cron: '0 13 * * 6'   # 토 22:00 KST
    - cron: '30 13 * * 6'  # 토 22:30 KST
    - cron: '30 14 * * 6'  # 토 23:30 KST
    - cron: '0 16 * * 6'   # 일 01:00 KST — 최종 안전망
  workflow_dispatch:
    inputs:
      round:
        description: '특정 회차 번호 (비우면 최근 N회차)'
        required: false
        default: ''
      recent:
        description: '최근 N회차 (기본 5)'
        required: false
        default: '5'

concurrency:
  group: fetch-lottery
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run mirror fetcher
        run: |
          if [ -n "${{ github.event.inputs.round }}" ]; then
            node scripts/fetch-from-mirror.mjs --round=${{ github.event.inputs.round }}
          else
            node scripts/fetch-from-mirror.mjs --recent=${{ github.event.inputs.recent || '5' }}
          fi

      - name: Aggregate stores (1등/2등 배출점 누적)
        run: node scripts/aggregate-stores.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/enriched/ src/data/stores.json
          if git diff --cached --quiet; then
            echo "✅ No changes (data already up to date)"
          else
            LATEST=$(ls data/enriched/*.json 2>/dev/null | grep -v index.json | sort -V | tail -1 | xargs basename .json)
            git commit -m "[auto] 회차 데이터 갱신 (~${LATEST}회, $(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ Pushed updated data"
          fi
