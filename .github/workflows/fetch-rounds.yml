name: Fetch round data

# 매주 토요일 22:00 KST (= UTC 13:00) 자동 실행 + 수동 실행 가능.
# 추첨 21:30 후 +30분 여유로 등위/판매점 정보가 완전히 올라온 후 수집.
on:
  schedule:
    - cron: '0 13 * * 6'
  workflow_dispatch:
    inputs:
      round:
        description: '특정 회차 번호 (비우면 최신 회차 자동)'
        required: false
        default: ''
      recent:
        description: '최근 N회차 일괄 (예: 10)'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run Playwright enrich script
        run: |
          if [ -n "${{ github.event.inputs.round }}" ]; then
            node scripts/fetch-playwright.mjs --round=${{ github.event.inputs.round }}
          elif [ -n "${{ github.event.inputs.recent }}" ]; then
            node scripts/fetch-playwright.mjs --recent=${{ github.event.inputs.recent }}
          else
            node scripts/fetch-playwright.mjs
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/enriched/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "데이터 자동 갱신 ($(date -u +'%Y-%m-%d %H:%MZ'))"
            git push
          fi
